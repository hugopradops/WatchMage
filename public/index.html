<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MageTrack - Gaming Dashboard</title>
  <meta name="description" content="Your handy PC gaming tool — track Steam sales, upcoming releases, Metacritic scores, and gaming news.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧙</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
  <div class="ambient-orb orb-3"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="mage-logo" aria-label="Mage Logo">
        <svg viewBox="0 0 120 120" class="mage-svg" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#4a9eff"/>
              <stop offset="100%" style="stop-color:#3580d9"/>
            </linearGradient>
            <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#ffe0bd"/>
              <stop offset="100%" style="stop-color:#f5cea0"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <polygon points="60,8 38,58 82,58" fill="url(#hatGrad)" />
          <ellipse cx="60" cy="58" rx="32" ry="6" fill="url(#hatGrad)" />
          <text x="55" y="38" font-size="14" fill="#ff4939" filter="url(#glow)" class="hat-star">✦</text>
          <circle cx="60" cy="12" r="4" fill="#ff4939" filter="url(#glow)" class="hat-orb"/>
          <ellipse cx="60" cy="72" rx="18" ry="16" fill="url(#faceGrad)" />
          <circle cx="53" cy="70" r="2.5" fill="#1a1a2e" class="eye-left"/>
          <circle cx="67" cy="70" r="2.5" fill="#1a1a2e" class="eye-right"/>
          <circle cx="54" cy="69" r="1" fill="white" opacity="0.8"/>
          <circle cx="68" cy="69" r="1" fill="white" opacity="0.8"/>
          <polygon points="48,82 60,105 72,82" fill="#c8ccd8" opacity="0.9"/>
          <polygon points="52,82 60,98 68,82" fill="#dde0ea" opacity="0.5"/>
        </svg>
      </div>
      <div class="topbar-brand">
        <h1 class="topbar-title">MageTrack</h1>
        <p class="topbar-subtitle">Your Handy PC Gaming Tool</p>
      </div>
    </div>
    <div class="topbar-center">
      <div class="stat-pill" id="stat-sale">
        <span class="stat-icon">🔥</span>
        <span class="stat-text" id="stat-sale-text">Loading...</span>
      </div>
      <div class="stat-pill" id="stat-releases">
        <span class="stat-icon">🚀</span>
        <span class="stat-text" id="stat-releases-text">Loading...</span>
      </div>
      <div class="stat-pill" id="stat-news">
        <span class="stat-icon">📰</span>
        <span class="stat-text" id="stat-news-text">Loading...</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="hero-clock" id="hero-clock"></div>
    </div>
  </header>

  <!-- 2x2 dashboard grid -->
  <main class="dashboard">
    <!-- Steam Sale Countdown -->
    <section class="card card-sale" id="sale-section">
      <div class="card-header">
        <div class="card-icon-wrap sale-icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>
        </div>
        <h2>Next Steam Sale</h2>
      </div>
      <div class="card-body" id="sale-content">
        <div class="skeleton-loader">
          <div class="skeleton skeleton-circle"></div>
          <div class="skeleton skeleton-text" style="width:60%"></div>
          <div class="skeleton skeleton-boxes"></div>
        </div>
      </div>
    </section>

    <!-- Upcoming Releases -->
    <section class="card card-releases" id="releases-section">
      <div class="card-header">
        <div class="card-icon-wrap releases-icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12"/><path d="M18 9a3 3 0 100-6 3 3 0 000 6z"/><path d="M6 21a3 3 0 100-6 3 3 0 000 6z"/><path d="M18 9c-3 0-6 2-6 6"/></svg>
        </div>
        <h2>Upcoming Releases</h2>
        <span class="card-badge" id="release-count"></span>
      </div>
      <div class="card-body card-body-scroll" id="releases-content">
        <div class="skeleton-loader skeleton-grid">
          <div class="skeleton skeleton-card-lg"></div>
          <div class="skeleton skeleton-card-lg"></div>
          <div class="skeleton skeleton-card-lg"></div>
          <div class="skeleton skeleton-card-lg"></div>
        </div>
      </div>
    </section>

    <!-- Metacritic Scores -->
    <section class="card card-reviews" id="reviews-section">
      <div class="card-header">
        <div class="card-icon-wrap reviews-icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <h2>Critic Scores</h2>
        <span class="card-badge" id="reviews-count"></span>
      </div>
      <div class="card-body card-body-scroll" id="reviews-content">
        <div class="skeleton-loader">
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
        </div>
      </div>
    </section>

    <!-- Gaming News -->
    <section class="card card-news" id="news-section">
      <div class="card-header">
        <div class="card-icon-wrap news-icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6z"/></svg>
        </div>
        <h2>Gaming News</h2>
        <span class="card-badge" id="news-count"></span>
      </div>
      <div class="card-body" id="news-content">
        <div class="skeleton-loader">
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
