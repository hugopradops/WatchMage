# ---------------------------------------------------------------------------
# CI — runs on every push and pull request to main
# ---------------------------------------------------------------------------

name: CI                          # Display name shown in the GitHub Actions tab

# ── TRIGGERS ──────────────────────────────────────────────────────────────
# "on:" defines WHEN this workflow runs.
on:
  push:
    branches: [main]              # Run when code is pushed directly to main
  pull_request:
    branches: [main]              # Run when a PR targets main

# ── JOBS ──────────────────────────────────────────────────────────────────
# A workflow contains one or more jobs. Each job runs on a fresh virtual machine.
jobs:
  ci:                             # Job ID (you pick the name)
    name: Lint, Test & Build      # Human-readable label in the Actions UI
    runs-on: ubuntu-latest        # The OS for the runner (GitHub provides this for free)

    # ── STEPS ─────────────────────────────────────────────────────────────
    # Steps run sequentially inside the job. If any step fails, the job stops.
    steps:

      # 1. Check out the repo so the runner has your code
      - name: Checkout code
        uses: actions/checkout@v4
        # "uses:" runs a reusable action from the GitHub marketplace.
        # actions/checkout clones your repo into the runner's workspace.

      # 2. Install Node.js and set up npm caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22            # Match the version in your Dockerfile
          cache: npm                  # Caches ~/.npm so future runs skip re-downloading packages
        # "with:" passes inputs to the action — like function arguments.

      # 3. Install dependencies from the lockfile (clean, reproducible install)
      - name: Install dependencies
        run: npm ci
        # "run:" executes a shell command.
        # "npm ci" is like "npm install" but stricter: it uses package-lock.json
        # exactly and deletes node_modules first, ensuring reproducible builds.

      # 4. Lint the codebase
      - name: Lint
        run: npm run lint
        # Runs ESLint with your flat config. Catches code quality and
        # formatting issues before they reach main.

      # 5. Type-check without emitting files
      - name: Type check
        run: npx tsc --noEmit
        # Runs the TypeScript compiler to find type errors.
        # --noEmit means "just check, don't produce .js output files."

      # 6. Run tests
      - name: Test
        run: npm test
        # Runs "vitest run" — your full test suite.

      # 7. Build the production app
      - name: Build
        run: npm run build
        # Runs "next build". This catches issues that only appear at build
        # time (e.g. broken imports, invalid page configs). Also proves
        # the app is deployable.
